name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      # The scaling layer, the heat-treatment rate laws and the cooling-curve
      # analysis are pure arithmetic — no browser, no GPU — so unlike the rest of
      # the verification suite they can be gated here.
      - run: node scripts/verify-units.mjs
      - run: node scripts/verify-heattreat.mjs
      - run: node scripts/verify-thermal.mjs
      - run: node scripts/verify-fade.mjs

# The rest of the headless verify-*.mjs suite (npm test) needs a WebGPU-capable
# Chrome at a hardcoded local path and is not portable to this runner — see
# TESTING.md.
# `npm run typecheck` IS gated here: the two noUnusedLocals exemptions this note
# used to cite (LENS3_NAMES, to3D in src/ui.ts) are both live imports now, so
# `tsc --noEmit` is clean and there is no reason to let it drift.
